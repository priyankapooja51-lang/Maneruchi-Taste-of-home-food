<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mane Ruchi Foods</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Mane Ruchi – Taste of Home</h1>
  <p>Fresh Homemade Batter Delivered Daily</p>
</header>

<!-- HERO -->
<section class="hero">
  <div class="slider">
    <img src="dosa.jpg.webp" class="slide active">
    <img src="Idli.jpg" class="slide">
    <img src="Pesarattu.jpg" class="slide">
    <img src="millet-dosa-5.jpg" class="slide">
  </div>

  <div class="hero-text">
    <h2>Fresh | Hygienic | No Preservatives</h2>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products">
<h2>Our Fresh Products</h2>

<div class="products-container">

<div class="product-card">
  <img src="dosa.jpg.webp">
  <h3>Dosa Batter</h3>
  <p>₹60</p>
  <button onclick="addToCart('Dosa Batter',60)" class="btn">Add to Cart</button>
</div>

<div class="product-card">
  <img src="Idli.jpg">
  <h3>Idli Batter</h3>
  <p>₹70</p>
  <button onclick="addToCart('Idli Batter',70)" class="btn">Add to Cart</button>
</div>

<div class="product-card">
  <img src="Pesarattu.jpg">
  <h3>Pesarattu Batter</h3>
  <p>₹99</p>
  <button onclick="addToCart('Pesarattu Batter',99)" class="btn">Add to Cart</button>
</div>

<div class="product-card">
  <img src="millet-dosa-5.jpg">
  <h3>Millets Batter</h3>
  <p>₹99</p>
  <button onclick="addToCart('Millets Batter',99)" class="btn">Add to Cart</button>
</div>

</div>
</section>

<!-- CART PANEL -->
<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cart-items"></div>

<p><b>Total: ₹<span id="total">0</span></b></p>

<label>Delivery Slot:</label>
<select id="slot">
  <option>Morning (7–10 AM)</option>
  <option>Afternoon (12–3 PM)</option>
  <option>Evening (5–8 PM)</option>
</select>

<br><br>

<button onclick="placeOrder()" class="btn">Order via WhatsApp</button>
<button onclick="payUPI()" class="btn pay">Pay via UPI</button>
</div>

<!-- FLOAT CART BUTTON -->
<button class="cart-btn" onclick="toggleCart()">🛒</button>

<footer>
<p>© 2026 Mane Ruchi Foods</p>
</footer>

<script>
let cart = [];

function addToCart(name, price){
  let item = cart.find(i => i.name === name);
  if(item){
    item.qty++;
  } else {
    cart.push({name, price, qty:1});
  }
  updateCart();
}

function updateCart(){
  let cartDiv = document.getElementById("cart-items");
  let total = 0;
  cartDiv.innerHTML = "";

  cart.forEach(item=>{
    total += item.price * item.qty;

    cartDiv.innerHTML += `
      <div>
        ${item.name} x ${item.qty}
        <button onclick="changeQty('${item.name}',1)">+</button>
        <button onclick="changeQty('${item.name}',-1)">-</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function changeQty(name, change){
  let item = cart.find(i => i.name === name);
  if(!item) return;
  item.qty += change;
  if(item.qty <= 0){
    cart = cart.filter(i=>i.name!==name);
  }
  updateCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("show");
}

function placeOrder(){
  let slot = document.getElementById("slot").value;
  let msg = "Order Details:\n";

  cart.forEach(item=>{
    msg += `${item.name} x ${item.qty}\n`;
  });

  msg += `Delivery Slot: ${slot}`;

  window.open(`https://wa.me/918105835995?text=${encodeURIComponent(msg)}`);
}

function payUPI(){
  let total = document.getElementById("total").innerText;
  let upi = `upi://pay?pa=yourupi@okaxis&pn=ManeRuchi&am=${total}&cu=INR`;
  window.location.href = upi;
}

/* SLIDER */
let slides = document.querySelectorAll(".slide");
let index = 0;
setInterval(()=>{
  slides[index].classList.remove("active");
  index = (index+1)%slides.length;
  slides[index].classList.add("active");
},3000);
</script>

</body>
</html>
